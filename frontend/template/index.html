<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачный сервис</title>
</head>
<body>
    <style>

body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}
.full-container{
    margin-top:20px;
    margin-left:20px;
    position: relative;
    display: flex;
    width: 25%;
    height:100%;
    border: none;
    justify-content: space-between;
    align-items:flex-start;
}
.add-button{
    display: flex;
    padding: 10px;
    border-radius: 50px;
    border:none;
    background-color: black;
    color:white;
     cursor: pointer;
}
.input-place{
    display: flex;
    padding: 10px;
    border-radius: 50px;
    border:1px solid black;
}
.table-container{
  justify-content: center;
  align-items: center;
  display: flex;
}
table {
  margin-top:20px;
  border-collapse: collapse;
  border: 2px solid rgb(29, 28, 28);
  font-family: sans-serif;
  font-size: 0.8rem;
  letter-spacing: 1px;
}
thead,
tfoot {
  background-color: rgb(228 240 245);
}

th,
td {
  border: 1px solid rgb(160 160 160);
  padding: 8px 10px;
}

td:last-of-type {
  text-align: center;
}

tbody > tr:nth-of-type(even) {
  background-color: rgb(237 238 242);
}
.log{
    display:flex;
    color:red;
    font-size:12px;
}
</style>
        <div class="full-container">
            <div>
                <input id="input-place" class="input-place" type="text" placeholder="Ваш ИИН"/>
                <p id="log" class="log"></p>
            </div>
            <div class="button-container">
                <input id="add-button" class="add-button" type="reset" value="Добавить" accesskey="r" />
            </div>
        </div>
<div class="table-container">
<table>
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">ИИН</th>
      <th scope="col">Статус</th>
      <th scope="col">Создано</th>
    </tr>
  </thead>
  <tbody id="tbody-container">
  </tbody>
</table>
</div>
    <!----Открытие модалки для данных-->
    <script>
    //Отдача ИИН 
    function PostData() {
            var inputContainer = document.getElementById("input-place")
            var sendButton = document.getElementById("add-button")
            var api = "http://localhost:10000/api/iin"
            sendButton.addEventListener("click", (event)=>{
                try{
                    const response = fetch(api, {
                    method: "POST",
                    body: JSON.stringify({ iin: inputContainer.value, is_valid: true}),
                    headers: {
                        "Content-Type": "application/json",
                    },
                
                })
                window.location.reload();
                }catch(error){
                    console.log("Ошибка:", error)
                }
            })
            inputContainer.value = ""
        }
    
    PostData()
    // //Включение 
    async function TableInfo () {
        var tableID = document.getElementById("tbody-container")
        try{
            const response = await fetch("http://localhost:10000/")
            const data = await response.json()
            console.log(data)
        }catch(error){
            console.log("Не удалось получить данные от фронта", error)
        }
    }
    TableInfo()

    function Validation(){
        var inputData = document.getElementById("input-place")
        var log = document.getElementById("log")
       inputData.addEventListener("keyup", () => {
        if (inputData.value.length > 12) {
            log.innerText = `ИИН не может превышать 12 символов`
        }else {
            log.innerText = ''
        }
       });
    }
    Validation()
    </script>
</body>
</html>
